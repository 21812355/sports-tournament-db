
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#185FA5',
    textColor: dark ? '#c2c0b6' : '#1a1a1a',
    primaryColor: dark ? '#1a2a3a' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#c2c0b6' : '#042C53',
    secondaryColor: dark ? '#1a2a1a' : '#EAF3DE',
    tertiaryColor: dark ? '#2a1a2a' : '#EEEDFE',
  },
});
const diagram = `erDiagram
  USER_GROUPS {
    int group_id PK
    string group_name
    string permissions
  }
  USERS {
    int user_id PK
    int group_id FK
    string username
    string email
    string password_hash
    string full_name
    timestamp created_at
  }
  TOURNAMENTS {
    int tournament_id PK
    int created_by FK
    string name
    string sport_type
    date start_date
    date end_date
    string status
    string location
  }
  TEAMS {
    int team_id PK
    int tournament_id FK
    int manager_id FK
    string team_name
    string country
    int wins
    int losses
  }
  PLAYERS {
    int player_id PK
    int team_id FK
    int user_id FK
    string full_name
    string position
    date dob
    string nationality
  }
  MATCHES {
    int match_id PK
    int tournament_id FK
    int team_a_id FK
    int team_b_id FK
    timestamp match_date
    string venue
    int score_a
    int score_b
    string status
  }
  MATCH_STATS {
    int stat_id PK
    int match_id FK
    int player_id FK
    int goals
    int assists
    int yellow_cards
    int red_cards
    int minutes_played
  }

  USER_GROUPS ||--o{ USERS : "has"
  USERS ||--o{ TOURNAMENTS : "creates"
  USERS ||--o{ TEAMS : "manages"
  TOURNAMENTS ||--o{ TEAMS : "contains"
  TOURNAMENTS ||--o{ MATCHES : "schedules"
  TEAMS ||--o{ PLAYERS : "has"
  USERS ||--o{ PLAYERS : "is"
  TEAMS ||--o{ MATCHES : "plays home"
  TEAMS ||--o{ MATCHES : "plays away"
  MATCHES ||--o{ MATCH_STATS : "records"
  PLAYERS ||--o{ MATCH_STATS : "generates"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
